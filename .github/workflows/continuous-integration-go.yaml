name: Continuous Integration (Go)

on:
  push:
    branches:
      - "master"
      - "develop"
      - "hotfix/**"
      - "feature/**"
      - "renovate/**"
      - "dependabot/**"

jobs:
  ci:
    name: Continuous Integration (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/cli
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"
          cache-dependency-path: packages/cli/go.sum
      - name: Install Dependencies
        run: go mod download
      - name: Linting
        run: go vet ./...
      - name: Test
        run: go test ./...
      - name: Build Production
        run: go build ./...
