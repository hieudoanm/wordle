name: Continuous Integration (TypeScript)

on:
  push:
    branches:
      - 'master'
      - 'develop'
      - 'hotfix/**'
      - 'feature/**'
      - 'renovate/**'
      - 'dependabot/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  # ── Lint & Test (runs once, on ubuntu only) ──────────────────────────────
  quality:
    name: Quality (lint + test)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: '10.33.0'

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '25.9.0'
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install

      - name: Lint
        run: pnpm run lint

      - name: Test
        run: pnpm run test

  # ── Build & Release (master only, all 3 platforms, after quality passes) ─
  build:
    name: Build (${{ matrix.platform }})
    needs: quality
    if: github.ref == 'refs/heads/master'
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            bundle_path: |
              packages/app/src-tauri/target/release/bundle/dmg/*.dmg
              packages/app/src-tauri/target/release/bundle/macos/*.app
          - platform: ubuntu-latest
            bundle_path: |
              packages/app/src-tauri/target/release/bundle/deb/*.deb
              packages/app/src-tauri/target/release/bundle/appimage/*.AppImage
          - platform: windows-latest
            bundle_path: |
              packages/app/src-tauri/target/release/bundle/msi/*.msi
              packages/app/src-tauri/target/release/bundle/nsis/*.exe
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: '10.33.0'

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '25.9.0'
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install

      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Build Production
        run: pnpm run build
        shell: bash

      - name: Create / Update Platform Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ matrix.platform }}
          name: ${{ matrix.platform }} Release
          body: 'Automated Build for ${{ matrix.platform }} latest commit on master.'
          draft: false
          prerelease: false
          overwrite: true
          files: ${{ matrix.bundle_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
