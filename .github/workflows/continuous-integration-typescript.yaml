name: Continuous Integration (TypeScript)

on:
  push:
    branches:
      - "master"
      - "develop"
      - "hotfix/**"
      - "feature/**"
      - "renovate/**"
      - "dependabot/**"

jobs:
  ci:
    name: Continuous Integration (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: "10.32.1"
      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "25.8.1"
      - name: Install Dependencies
        run: pnpm install
      - name: Linting
        run: pnpm run lint
      - name: Test
        run: pnpm run test
      - name: Build Production
        run: pnpm run build
