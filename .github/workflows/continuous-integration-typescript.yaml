name: Continuous Integration (TypeScript)

on:
  push:
    branches:
      - "master"
      - "develop"
      - "hotfix/**"
      - "feature/**"
      - "renovate/**"
      - "dependabot/**"

permissions:
  contents: write

jobs:
  ci:
    name: Continuous Integration (${{ matrix.platform }})
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            bundle_path: |
              packages/app/src-tauri/target/release/bundle/dmg/*.dmg
              packages/app/src-tauri/target/release/bundle/macos/*.app
          - platform: ubuntu-latest
            bundle_path: |
              packages/app/src-tauri/target/release/bundle/deb/*.deb
              packages/app/src-tauri/target/release/bundle/appimage/*.AppImage
          - platform: windows-latest
            bundle_path: |
              packages/app/src-tauri/target/release/bundle/msi/*.msi
              packages/app/src-tauri/target/release/bundle/nsis/*.exe
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: "10.33.0"
      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "25.9.0"
      - name: Install Dependencies
        run: pnpm install
      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev
      - name: Linting
        run: pnpm run lint
      - name: Test
        run: pnpm run test
      - name: Build Production
        run: pnpm run build
        shell: bash
      - name: Delete old platform release
        if: github.ref == 'refs/heads/master'
        uses: dev-drprasad/delete-tag-and-release@v1.1
        with:
          tag_name: ${{ matrix.platform }}
          delete_release: true
          github_token: ${{ secrets.GH_TOKEN }}
        continue-on-error: true
      - name: Create / Update platform release
        if: github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ matrix.platform }}
          name: Latest ${{ matrix.platform }} Release
          body: "Automated Build for ${{ matrix.platform }} latest commit on master."
          prerelease: true
          files: ${{ matrix.bundle_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
